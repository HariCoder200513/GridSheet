<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GridSheet</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="Favicon.png" type="image/x-icon" />
  </head>
  <body>
    <div class="formula-bar">
      <span class="cell-ref" id="cellRef">A1</span>
      <input type="text" id="formulaInput" class="formula-input" />
    </div>
    <div class="sheet-controls">
      <button id="saveSheet">Save</button>
      <button id="loadSheet">Load</button>
    </div>
    <section class="grid"></section>
    <script src="tokenizer.js"></script>
    <script src="parser.js"></script>
    <script src="evaluator.js"></script>
    <script src="script.js"></script>
  </body>
</html>
